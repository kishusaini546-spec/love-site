<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Reena 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container { padding: 20px; }

/* 🌸 PETALS */
.petal {
  position: fixed;
  top: -10px;
  pointer-events: none;
  animation: fall linear forwards;
}
@keyframes fall {
  0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) translateX(120px) rotate(360deg); opacity: 0; }
}

/* 💫 NAME */
.floating-name {
  font-size: 28px;
  margin-top: 10px;
  animation: floatName 3s infinite alternate;
}
@keyframes floatName {
  from { transform: translateY(0); }
  to { transform: translateY(-15px); }
}

/* IMAGE */
img {
  width: 240px;
  height: 300px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 0 15px white;
}

/* SHAYARI */
.box {
  width: 70%;
  margin: 20px auto;
  background: rgba(0,0,0,0.35);
  padding: 20px;
  border-radius: 15px;
  line-height: 30px;
}

/* INSTA */
.insta-bottom {
  margin-top: 15px;
}
.insta-bottom a {
  color: white;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
}
.insta-bottom img {
  width: 20px;
  height: 20px;
}

/* BUTTON */
.surprise-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: white;
  color: #ff4d88;
  font-weight: bold;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}
.popup-box {
  background: white;
  color: #ff4d88;
  padding: 20px;
  border-radius: 15px;
}

/* 💖 POPUP IMAGE */
.popup-img {
  width: 200px;
  height: 250px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 10px;
  box-shadow: 0 0 10px pink;
}
</style>

</head>

<body>

<div class="container">

<h1>💖 For Reena Deora 💖</h1>

<div class="floating-name" onclick="nameBlast(event)">
💖 Reena Deora 💖
</div>

<div id="typing"></div>

<img id="slide" src="photo1.jpg">

<div class="box">
💖 Teri muskaan meri jaan ban gayi,<br>
💖 Teri har baat meri pehchaan ban gayi,<br>
💖 Jab se dekha hai tujhe maine,<br>
💖 Tu meri duniya ki shaan ban gayi 💖
</div>

<button class="surprise-btn" onclick="showPopup()">Click for Surprise 💖</button>

<div class="insta-bottom">
  <a href="https://www.instagram.com/official_reena_deora22/" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
    official_reena_deora22
  </a>
</div>

<div>shree_kishan_bhati</div>

</div>

<!-- 💌 POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">

    <!-- 🔥 SPECIAL PHOTO -->
    <img src="popup.jpg" class="popup-img">

    <h2>I Love You Reena 💖</h2>
    <p>Tu meri duniya hai 💕</p>

    <button onclick="closePopup()">Close</button>
  </div>
</div>

<audio id="music">
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
// 🌸 PETALS
function createPetal() {
  const p = document.createElement("div");
  p.className = "petal";
  const flowers = ["🌸","🌺","🌷","🌹","🍃"];
  p.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
  p.style.left = Math.random()*100 + "vw";
  p.style.fontSize = (Math.random()*20 + 15) + "px";
  p.style.animationDuration = (Math.random()*5 + 5) + "s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),10000);
}
setInterval(createPetal, 250);

// typing
let t="I Love You Reena 💖",i=0;
(function type(){
  if(i<t.length){
    document.getElementById("typing").innerHTML+=t[i++];
    setTimeout(type,80);
  }
})();

// slideshow
let imgs=["photo1.jpg","photo2.jpg","photo3.jpg"],x=0;
setInterval(()=>{
  x=(x+1)%imgs.length;
  document.getElementById("slide").src=imgs[x];
},2500);

// 💖 HEART BLAST
function nameBlast(e){
  for(let i=0;i<12;i++){
    let h=document.createElement("div");
    h.innerHTML="💖";
    h.style.position="absolute";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    document.body.appendChild(h);

    let x=(Math.random()-0.5)*150;
    let y=(Math.random()-0.5)*150;

    h.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${x}px,${y}px)`,opacity:0}
    ],{duration:1000});

    setTimeout(()=>h.remove(),1000);
  }
}

// popup + music
function showPopup(){
  document.getElementById("popup").style.display="flex";
  document.getElementById("music").play();
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
